<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tik-Toc Workshop - Comments</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="screen comments-screen active">
        <div class="phone-frame">
            <div class="top-bar">
                <span>Comments</span>
                <a href="feed.html" style="color: #fff; text-decoration: none; cursor: pointer;">✕</a>
            </div>

            <div class="video-section">
                <div class="video-large">
                    <img src="Resources/dencemoves.png" alt="Video" class="video-bg-image">
                </div>
                <span class="comment-count">247 comments</span>
            </div>

            <div class="comments-list">
                <div class="comment-item">
                    <img src="Resources/tiktok.png" alt="User" class="comment-logo">
                    <div class="comment-content">
                        <div class="comment-username">Alex Chen</div>
                        <div class="comment-text">This is fireeeee 🔥🔥</div>
                    </div>
                </div>
                <div class="comment-item">
                    <img src="Resources/tiktok.png" alt="User" class="comment-logo">
                    <div class="comment-content">
                        <div class="comment-username">jessica_b</div>
                        <div class="comment-text">omg so good!! where did u learn this</div>
                    </div>
                </div>
                <div class="comment-item">
                    <img src="Resources/tiktok.png" alt="User" class="comment-logo">
                    <div class="comment-content">
                        <div class="comment-username">TechGuru_Ryan</div>
                        <div class="comment-text">Tutorial please!!!</div>
                    </div>
                </div>
                <div class="comment-item">
                    <img src="Resources/tiktok.png" alt="User" class="comment-logo">
                    <div class="comment-content">
                        <div class="comment-username">Lisa.K</div>
                        <div class="comment-text">already saved this 💯</div>
                    </div>
                </div>
            </div>

            <div class="comment-input-section">
                <div class="comment-input-field">
                    <img src="Resources/tiktok.png" alt="User" class="input-logo">
                    <input type="text" placeholder="Add Comment" class="input-field">
                </div>
                <div class="emoji-buttons">
                    <button class="emoji-btn">😊</button>
                    <button class="emoji-btn">🔗</button>
                    <button class="emoji-btn">@</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
