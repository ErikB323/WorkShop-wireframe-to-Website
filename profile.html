<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tik-Toc Workshop - Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="screen profile-screen active">
        <div class="phone-frame">
            <div class="top-bar">
                <a href="feed.html" style="color: #fff; text-decoration: none; cursor: pointer;">Back</a>
                <button class="menu-btn">⋮</button>
            </div>

            <div class="profile-content">
                <div class="profile-header">
                    <img src="Resources/tiktok.png" alt="User" class="profile-logo">
                    <h2>sarah_music</h2>
                </div>

                <div class="stats-bar">
                    <div class="stat">
                        <span class="stat-number">2.4M</span>
                        <span class="stat-label">Followers</span>
                    </div>
                    <div class="stat">
                        <span class="stat-number">543</span>
                        <span class="stat-label">Following</span>
                    </div>
                    <div class="stat">
                        <span class="stat-number">48.3M</span>
                        <span class="stat-label">Likes</span>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="btn btn-follow" onclick="window.location.href='feed.html'">Follow</button>
                    <button class="btn btn-message">Message</button>
                </div>

                <div class="bio-section">Dance creator 💃 Music enthusiast 🎵 Always creating fresh content! 🌟 Collab inquiries: sarah@creative.com</div>

                <div class="videos-grid">
                    <div class="video-item-grid">Video 1</div>
                    <div class="video-item-grid">Video 2</div>
                    <div class="video-item-grid">Video 3</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
